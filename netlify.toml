[build]
  command = "NEXT_DISABLE_TURBOPACK=1 NEXT_PRIVATE_TURBOPACK=0 npx prisma generate && NEXT_DISABLE_TURBOPACK=1 NEXT_PRIVATE_TURBOPACK=0 next build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NEXT_DISABLE_TURBOPACK = "1"
  NEXT_PRIVATE_TURBOPACK = "0"
  NEXT_FONT_GOOGLE_MOCKED_RESPONSES = "true"
